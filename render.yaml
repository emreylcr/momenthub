services:
  - type: web
    name: momenthub
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: DATABASE_URL=postgresql://build:build@127.0.0.1:5432/build npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: momenthub-db
          property: connectionString

databases:
  - name: momenthub-db
    plan: free
    region: frankfurt
    databaseName: momenthub
    user: momenthub
