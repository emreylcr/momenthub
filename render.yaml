services:
  - type: web
    name: momenthub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: momenthub-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/opt/render/project/src/data/dev.db
      - key: AUTH_SECRET
        generateValue: true
